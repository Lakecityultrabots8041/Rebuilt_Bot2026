name: Build

# Runs on every pull request into main, and on every push to main.
# A green check means the robot code compiled and all tests passed.
# A red X means something is broken — do not merge until it is green.

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# If you push again before the last run finishes, cancel the old run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Compile and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle and WPILib downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', 'gradlew', 'vendordeps/*.json') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and test
        run: ./gradlew build --no-daemon
